<!DOCTYPE html>
<html>
<head>
  <title>Abhi Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <img src="assets/profile.jpg" class="profile">
    <h1>Abhi Chellath</h1>
    <p class="typing"></p>
  </section>

  <!-- ABOUT -->
  <section class="card">
    <h2>About Me</h2>
    <p>I am a passionate developer who loves building modern web apps.</p>
  </section>

  <!-- SKILLS -->
  <section class="card">
    <h2>Skills</h2>
    <div class="skills">
      <span>HTML</span>
      <span>CSS</span>
      <span>JavaScript</span>
      <span>Firebase</span>
    </div>
  </section>

  <!-- PROJECTS -->
  <section class="card">
    <h2>Projects</h2>
    <div id="projects"></div>
  </section>

  <!-- CONTACT -->
  <section class="card">
    <h2>Contact Me</h2>

    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Your Message" required></textarea>
      
      <button type="submit">Send Message</button>
    </form>

    <p id="successMsg">✅ Message sent successfully!</p>
  </section>

  <!-- SCRIPT -->
  <script type="module" src="./app.js"></script>
</body>
</html>
